<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genesis2 Simulator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #111827; color: #e5e7eb; }
    .container { max-width: 1000px; margin: 24px auto; padding: 0 16px; }
    .card { background: #1f2937; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    input, button, select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #374151; background: #0f172a; color: #e5e7eb; }
    button { cursor: pointer; background: #2563eb; border: none; }
    h1, h2 { margin-top: 0; }
    pre { background: #0b1220; padding: 12px; border-radius: 6px; overflow-x: auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Genesis2 Evolution Simulator</h1>

    <div class="card">
      <h2>Simulation Setup</h2>
      <div class="grid">
        <label>Preset
          <select id="preset">
            <option value="default">Default (10 agents / 50 generations)</option>
            <option value="fast">Fast (8 agents / 20 generations)</option>
            <option value="stress">Stress (20 agents / 80 generations)</option>
          </select>
        </label>
        <label>Seed <input id="seed" type="number" value="42"></label>
        <label>Agents <input id="agents" type="number" value="10"></label>
        <label>Generations <input id="generations" type="number" value="50"></label>
      </div>
      <div style="margin-top:12px;">
        <button id="runBtn">Run Simulation</button>
      </div>
    </div>

    <div class="card">
      <h2>Live Dashboard</h2>
      <div id="summary">Idle</div>
      <pre id="timeline">No run yet.</pre>
    </div>

    <div class="card">
      <h2>Agent Inspector (Top 5 by energy)</h2>
      <pre id="agentsOut">No run yet.</pre>
    </div>

    <div class="card">
      <h2>Board + Reports Viewer</h2>
      <pre id="reportsOut">No run yet.</pre>
    </div>
  </div>

<script>
const preset = document.getElementById('preset');
const seed = document.getElementById('seed');
const agents = document.getElementById('agents');
const generations = document.getElementById('generations');
const summary = document.getElementById('summary');
const timeline = document.getElementById('timeline');
const agentsOut = document.getElementById('agentsOut');
const reportsOut = document.getElementById('reportsOut');

preset.addEventListener('change', () => {
  if (preset.value === 'fast') { agents.value = 8; generations.value = 20; }
  if (preset.value === 'default') { agents.value = 10; generations.value = 50; }
  if (preset.value === 'stress') { agents.value = 20; generations.value = 80; }
});

document.getElementById('runBtn').addEventListener('click', async () => {
  summary.textContent = 'Running...';
  const payload = {
    seed: Number(seed.value),
    agents: Number(agents.value),
    generations: Number(generations.value)
  };

  const res = await fetch('/api/run', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  const data = await res.json();
  const result = data.result;
  summary.textContent = `Done | Final population: ${result.final_population} | log: ${result.summary_path}`;
  timeline.textContent = JSON.stringify(result.timeline.slice(-10), null, 2);
  const topAgents = [...result.agents].sort((a,b) => b.energy - a.energy).slice(0, 5);
  agentsOut.textContent = JSON.stringify(topAgents, null, 2);
  reportsOut.textContent = JSON.stringify({
    totalGenerations: result.timeline.length,
    latest: result.timeline[result.timeline.length - 1]
  }, null, 2);
});
</script>
</body>
</html>
